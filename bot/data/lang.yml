  tx_not_work_bot: |
    {name}, я всегда рад помочь вам,
    но для начала 👇 прочитай ответы на частые вопросы ниже
    
    1. На данный момент сотовые операторы и провайдеры блокируют все BOT в России, но у нас есть обход всех блокировок. Откройте меню бота, кнопка где поле для ввода текста. В главном меню > Сменить протокол > Меняем на VLESS и следуем инструкции.
    2. Если у вас не прошла оплата, то напишите в бота «проблемы с оплатой» и последние 4 цифры карты с которой оплачивали. Скрины бот не понимает! Текстом пожалуйста. Возможно оплата прошла, перейдите в меню бота «мои активные ключи» и смотрите активные и их срок действия.
    3. Сервера работают без перебоев, но ваш телефон может менять сеть, при этом впн переподключается (с сотовой на вай фай), может быть не стабильный сигнал сотовой сети, ваш телефон не хочет обновлять днс или ваш роутер. Отключите впн, закройте все приложения, включите режим в самолете, далее обратно, потом впн. У вас все будет работать! Это всегда будет помогать и не связано с впн.
    4. Далее про Инстаграм! Если у вас все сайты открывает, а инстаграм нет, то это известная причина и она у многих. Они обновили приложение! Нужно полностью удалить приложение инстаграм и установить снова. Проблема будет решена навсегда!
    5. Так же есть старые роутеры без поддержки впн и роутеры в публичных зонах (кафе, магазины…). Эти проблемы не на нашей стороне, у нас все работает 24/7.
    6. Если у вас не работает впн только через сотовою связь, то напишите нам в боте. На данный момент операторы блокируют впн подключения, но мы постоянно работаем над обходами.

    Если ВПН не работает и Ваш случай попадает под пункты выше, то напишите мне @{nick_help}
